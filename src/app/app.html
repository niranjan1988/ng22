<main class="main">
  <div class="content">
    <section>
      <div>
        <span>Set Title: </span><input type="text" [value]="title()" (input)="setTitle($event.target.value)" />
      </div>
      <div>
        <span>Set Description: </span><input type="text" [value]="description()"
          (input)="setDescription($event.target.value)" />
      </div>
      <div>
        <button (click)="updateTitle()">Update Title</button>
      </div>

      <br />

      <div><span>Title Signal: </span>{{title()}}</div>
      <div><span>Subtitle Computed: </span>{{subtitle()}}</div>
      <div><span>Description Signal: </span>{{description()}}</div>
      <div><span>Title text: </span>{{titleText()}}</div>
      <div><span>Title text - Untracked Description: </span>{{untrackedDescription()}}</div>
      <br>
      <div><span>Equality check: </span></div>
      <div>
        <button (click)="setTitle(title())">Set same title</button> &nbsp;
        <button (click)="setTitle(title() + ' updated')">Set different title</button>
      </div>
    </section>

    <section>

    </section>

  </div>
</main>

<router-outlet />
